<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <script>
    (function(){
      var t = localStorage.getItem('claude-bar-theme');
      if (t === 'light' || t === 'mauve') document.documentElement.dataset.theme = t;
    })();
  </script>
</head>

<body>
  <div class="wrap">
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="bar">
      <div class="top-row">
        <div class="left">
          <div class="dot load" id="dot"></div>
          <span class="label">Claude</span>
        </div>
        <div class="timer" id="timer">--:--</div>
      </div>
      <div class="plan-label" id="planLabel"></div>
      <div class="bars" id="bars">
        <div class="no-data">loading...</div>
      </div>
      <div class="footer">
        <span class="updated" id="updated">refreshing every 2min</span>
        <button class="theme-btn" id="themeBtn" title="Cycle theme">◑</button>
        <button class="theme-btn" id="pinBtn" title="Toggle always on top">⊤</button>
        <button class="login-btn" id="loginBtn">↗ log in</button>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>

</html>
